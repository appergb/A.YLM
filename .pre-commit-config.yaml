# Pre-commit hooks configuration for A.YLM project
# See https://pre-commit.com for more information

repos:
  # Ruff: Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # MyPy: Static type checker
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies: [types-all]
        args: [--ignore-missing-imports]

  # Trailing whitespace removal
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^.*\.(ply|bin|dat)$  # Exclude binary/point cloud files

      - id: end-of-file-fixer
        exclude: ^.*\.(ply|bin|dat)$  # Exclude binary/point cloud files

      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1024]  # Allow files up to 1MB

      - id: check-merge-conflict
      - id: debug-statements
      - id: check-ast  # Check Python syntax

  # Black: Python code formatter (kept for compatibility, though ruff-format covers this)
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3
        exclude: ^.*\.(ply|bin|dat)$